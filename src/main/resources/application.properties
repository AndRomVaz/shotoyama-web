spring.application.name=shotoyama-web
server.port=${PORT:8080}
spring.datasource.url=jdbc:h2:file:./data/shotoyama;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.thymeleaf.cache=false
app.admin.username=${ADMIN_USER:admin}
app.admin.password=${ADMIN_PASSWORD:CambiarShotoyama2026!}
app.google-calendar.embed-url=${GOOGLE_CALENDAR_EMBED_URL:}
