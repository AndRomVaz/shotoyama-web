<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Panel | Shotoyama</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body>
<div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main"><header class="admin-title"><div><small>PANEL GENERAL</small><h1>Gestiona la web del club</h1></div></header>
<section class="stats"><a th:href="@{/admin/noticias}"><strong th:text="${noticias}">0</strong><span>Noticias</span></a><a th:href="@{/admin/eventos}"><strong th:text="${eventos}">0</strong><span>Eventos</span></a><a th:href="@{/admin/actividades}"><strong th:text="${actividades}">0</strong><span>Actividades</span></a><a th:href="@{/admin/horarios}"><strong th:text="${horarios}">0</strong><span>Horarios</span></a><a th:href="@{/admin/mensajes}"><strong th:text="${mensajes}">0</strong><span>Mensajes nuevos</span></a></section>
<section class="admin-grid"><article class="admin-card"><h2>Acciones rápidas</h2><div class="quick-admin"><a th:href="@{/admin/noticias/nueva}">＋ Nueva noticia</a><a th:href="@{/admin/eventos/nuevo}">＋ Nuevo evento</a><a th:href="@{/admin/actividades/nueva}">＋ Nueva actividad</a><a th:href="@{/admin/horarios/nuevo}">＋ Nuevo horario</a></div></article><article class="admin-card"><h2>Próximos eventos</h2><div class="admin-event" th:each="e:${proximos}"><span><strong th:text="${@formato.diaMes(e.inicio)}">17 Jul</strong><small th:text="${@formato.hora(e.inicio)}">18:00</small></span><b th:text="${e.titulo}">Evento</b></div></article></section>
</main></body></html>
