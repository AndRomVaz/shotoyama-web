<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Horario | Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main narrow"><header class="admin-title"><div><a th:href="@{/admin/horarios}">← Horarios</a><h1 th:text="${horario.id==null}?'Nuevo horario':'Editar horario'">Horario</h1></div></header>
<form class="admin-form" th:action="@{/admin/horarios/guardar}" th:object="${horario}" method="post"><input type="hidden" th:field="*{id}"><div class="form-row"><label>Localidad<input th:field="*{localidad}"><small th:errors="*{localidad}"></small></label><label>Grupo<input th:field="*{grupo}"><small th:errors="*{grupo}"></small></label></div><div class="form-row"><label>Días<input th:field="*{dias}" placeholder="Lunes y miércoles"><small th:errors="*{dias}"></small></label><label>Franja<input th:field="*{franja}" placeholder="17:00 - 18:00"><small th:errors="*{franja}"></small></label></div><div class="form-row"><label>Instalación<input th:field="*{instalacion}"></label><label>Entrenador/a<input th:field="*{entrenador}"></label></div><label>Observaciones<input th:field="*{observaciones}"></label><div class="form-row"><label>Orden visual<input type="number" th:field="*{ordenVisual}"></label><div class="checks"><label><input type="checkbox" th:field="*{activo}"> Visible en la web</label></div></div><footer><a th:href="@{/admin/horarios}">Cancelar</a><button>Guardar horario</button></footer></form></main></body></html>
