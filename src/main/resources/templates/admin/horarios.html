<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Horarios | Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <div th:replace="~{fragments/admin-header :: header}"></div>
    <main class="admin-main">
        <header class="admin-title">
            <div><a th:href="@{/admin}">← Panel</a>
                <h1>Horarios</h1>
            </div><a class="admin-primary" th:href="@{/admin/horarios/nuevo}">＋ Nuevo horario</a>
        </header>
        <div class="alert success" th:if="${exito}" th:text="${exito}"></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Localidad</th>
                        <th>Grupo</th>
                        <th>Días</th>
                        <th>Hora</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="e:${elementos}">
                        <td><strong th:text="${e.localidad}">Localidad</strong></td>
                        <td th:text="${e.grupo}">Grupo</td>
                        <td th:text="${e.dias}">Días</td>
                        <td th:text="${e.franja}">Hora</td>
                        <td class="actions"><a th:href="@{/admin/horarios/{id}/editar(id=${e.id})}">Editar</a>
                            <form th:action="@{/admin/horarios/{id}/eliminar(id=${e.id})}" method="post"
                                onsubmit="return confirm('¿Eliminar el horario?')"><button>Eliminar</button></form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
