<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Actividad | Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main narrow"><header class="admin-title"><div><a th:href="@{/admin/actividades}">← Actividades</a><h1 th:text="${actividad.id==null}?'Nueva actividad':'Editar actividad'">Actividad</h1></div></header>
<form class="admin-form" th:action="@{/admin/actividades/guardar}" th:object="${actividad}" method="post"><input type="hidden" th:field="*{id}"><label>Nombre<input th:field="*{nombre}"><small th:errors="*{nombre}"></small></label><label>Resumen<textarea rows="3" th:field="*{resumen}"></textarea><small th:errors="*{resumen}"></small></label><label>Descripción<textarea rows="8" th:field="*{descripcion}"></textarea><small th:errors="*{descripcion}"></small></label><div class="form-row"><label>Categoría<input th:field="*{categoria}"></label><label>Edad recomendada<input th:field="*{edad}"></label></div><div class="form-row"><label>URL de imagen<input type="url" th:field="*{imagenUrl}"></label><label>Orden visual<input type="number" th:field="*{ordenVisual}"></label></div><div class="checks"><label><input type="checkbox" th:field="*{activa}"> Visible en la web</label></div><footer><a th:href="@{/admin/actividades}">Cancelar</a><button>Guardar actividad</button></footer></form></main></body></html>
