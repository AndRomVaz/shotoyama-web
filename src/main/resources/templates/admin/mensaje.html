<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mensaje | Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main narrow"><header class="admin-title"><div><a th:href="@{/admin/mensajes}">← Mensajes</a><h1 th:text="${mensaje.asunto}">Asunto</h1></div></header><article class="message"><div><span><small>De</small><strong th:text="${mensaje.nombre}">Nombre</strong><a th:href="${'mailto:'+mensaje.email}" th:text="${mensaje.email}">Email</a></span><span><small>Fecha</small><strong th:text="${@formato.fechaHora(mensaje.fechaEnvio)}">Fecha</strong><b th:text="${mensaje.telefono}">Teléfono</b></span></div><p th:text="${mensaje.mensaje}">Mensaje</p><a class="admin-primary" th:href="${'mailto:'+mensaje.email+'?subject=Re: '+mensaje.asunto}">Responder por correo</a></article></main></body></html>
