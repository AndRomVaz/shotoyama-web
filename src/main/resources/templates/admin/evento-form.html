<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Evento | Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main narrow"><header class="admin-title"><div><a th:href="@{/admin/eventos}">← Eventos</a><h1 th:text="${evento.id==null}?'Nuevo evento':'Editar evento'">Evento</h1></div></header>
<form class="admin-form" th:action="@{/admin/eventos/guardar}" th:object="${evento}" method="post"><input type="hidden" th:field="*{id}"><label>Título<input th:field="*{titulo}"><small th:errors="*{titulo}"></small></label><label>Descripción<textarea rows="5" th:field="*{descripcion}"></textarea></label><div class="form-row"><label>Inicio<input type="datetime-local" th:field="*{inicio}"><small th:errors="*{inicio}"></small></label><label>Fin<input type="datetime-local" th:field="*{fin}"></label></div><div class="form-row"><label>Ubicación<input th:field="*{ubicacion}"></label><label>Tipo<select th:field="*{tipo}"><option>CLUB</option><option>ENTRENAMIENTO</option><option>COMPETICIÓN</option><option>TECNIFICACIÓN</option><option>EXAMEN</option><option>TALLER</option></select></label></div><div class="checks"><label><input type="checkbox" th:field="*{visible}"> Visible en la web</label></div><footer><a th:href="@{/admin/eventos}">Cancelar</a><button>Guardar evento</button></footer></form></main></body></html>
