<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Actividades | Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main"><header class="admin-title"><div><a th:href="@{/admin}">← Panel</a><h1>Actividades</h1></div><a class="admin-primary" th:href="@{/admin/actividades/nueva}">＋ Nueva actividad</a></header><div class="alert success" th:if="${exito}" th:text="${exito}"></div><div class="table-wrap"><table><thead><tr><th>Actividad</th><th>Categoría</th><th>Edad</th><th>Estado</th><th>Acciones</th></tr></thead><tbody><tr th:each="e:${elementos}"><td><strong th:text="${e.nombre}">Nombre</strong></td><td th:text="${e.categoria}">Categoría</td><td th:text="${e.edad}">Edad</td><td><span class="status" th:classappend="${e.activa}?' active':' inactive'" th:text="${e.activa}?'Visible':'Oculta'"></span></td><td class="actions"><a th:href="@{/admin/actividades/{id}/editar(id=${e.id})}">Editar</a><form th:action="@{/admin/actividades/{id}/eliminar(id=${e.id})}" method="post" onsubmit="return confirm('¿Eliminar la actividad?')"><button>Eliminar</button></form></td></tr></tbody></table></div></main></body></html>
