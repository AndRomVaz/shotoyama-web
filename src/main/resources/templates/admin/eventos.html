<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Eventos | Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main"><header class="admin-title"><div><a th:href="@{/admin}">← Panel</a><h1>Calendario y eventos</h1></div><a class="admin-primary" th:href="@{/admin/eventos/nuevo}">＋ Nuevo evento</a></header><div class="alert success" th:if="${exito}" th:text="${exito}"></div><div class="table-wrap"><table><thead><tr><th>Evento</th><th>Fecha</th><th>Tipo</th><th>Estado</th><th>Acciones</th></tr></thead><tbody><tr th:each="e:${elementos}"><td><strong th:text="${e.titulo}">Evento</strong><small th:text="${e.ubicacion}">Lugar</small></td><td th:text="${@formato.fechaHora(e.inicio)}">Fecha</td><td th:text="${e.tipo}">Tipo</td><td><span class="status" th:classappend="${e.visible}?' active':' inactive'" th:text="${e.visible}?'Visible':'Oculto'"></span></td><td class="actions"><a th:href="@{/admin/eventos/{id}/editar(id=${e.id})}">Editar</a><form th:action="@{/admin/eventos/{id}/eliminar(id=${e.id})}" method="post" onsubmit="return confirm('¿Eliminar el evento?')"><button>Eliminar</button></form></td></tr></tbody></table></div></main></body></html>
