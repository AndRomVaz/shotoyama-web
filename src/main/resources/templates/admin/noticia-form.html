<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Noticia | Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main narrow"><header class="admin-title"><div><a th:href="@{/admin/noticias}">← Noticias</a><h1 th:text="${noticia.id==null}?'Nueva noticia':'Editar noticia'">Noticia</h1></div></header>
<form class="admin-form" th:action="@{/admin/noticias/guardar}" th:object="${noticia}" method="post"><input type="hidden" th:field="*{id}"><label>Título<input th:field="*{titulo}"><small th:errors="*{titulo}"></small></label><label>Resumen<textarea rows="3" th:field="*{resumen}"></textarea><small th:errors="*{resumen}"></small></label><label>Contenido<textarea rows="12" th:field="*{contenido}"></textarea><small th:errors="*{contenido}"></small></label><div class="form-row"><label>Fecha<input type="date" th:field="*{fechaPublicacion}"></label><label>URL de imagen<input type="url" th:field="*{imagenUrl}" placeholder="https://..."></label></div><label>Fuente original<input type="url" th:field="*{fuenteUrl}" placeholder="https://..."></label><div class="checks"><label><input type="checkbox" th:field="*{publicada}"> Publicada</label><label><input type="checkbox" th:field="*{destacada}"> Destacada</label></div><footer><a th:href="@{/admin/noticias}">Cancelar</a><button>Guardar noticia</button></footer></form></main></body></html>
