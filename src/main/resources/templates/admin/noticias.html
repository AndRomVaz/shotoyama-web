<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Noticias | Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main"><header class="admin-title"><div><a th:href="@{/admin}">← Panel</a><h1>Noticias</h1></div><a class="admin-primary" th:href="@{/admin/noticias/nueva}">＋ Nueva noticia</a></header><div class="alert success" th:if="${exito}" th:text="${exito}"></div><div class="table-wrap"><table><thead><tr><th>Título</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr></thead><tbody><tr th:each="e:${elementos}"><td><strong th:text="${e.titulo}">Título</strong></td><td th:text="${@formato.corta(e.fechaPublicacion)}">Fecha</td><td><span class="status" th:classappend="${e.publicada}?' active':' inactive'" th:text="${e.publicada}?'Publicada':'Oculta'"></span></td><td class="actions"><a th:href="@{/admin/noticias/{id}/editar(id=${e.id})}">Editar</a><form th:action="@{/admin/noticias/{id}/eliminar(id=${e.id})}" method="post" onsubmit="return confirm('¿Eliminar la noticia?')"><button>Eliminar</button></form></td></tr></tbody></table></div></main></body></html>
