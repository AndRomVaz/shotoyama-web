<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mensajes | Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><div th:replace="~{fragments/admin-header :: header}"></div><main class="admin-main"><header class="admin-title"><div><a th:href="@{/admin}">← Panel</a><h1>Mensajes de contacto</h1></div></header><div class="alert success" th:if="${exito}" th:text="${exito}"></div><div class="table-wrap"><table><thead><tr><th>Remitente</th><th>Asunto</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr></thead><tbody><tr th:each="e:${elementos}"><td><strong th:text="${e.nombre}">Nombre</strong><small th:text="${e.email}">Email</small></td><td th:text="${e.asunto}">Asunto</td><td th:text="${@formato.fechaHora(e.fechaEnvio)}">Fecha</td><td><span class="status" th:classappend="${e.leido}?' inactive':' active'" th:text="${e.leido}?'Leído':'Nuevo'"></span></td><td class="actions"><a th:href="@{/admin/mensajes/{id}(id=${e.id})}">Abrir</a><form th:action="@{/admin/mensajes/{id}/eliminar(id=${e.id})}" method="post" onsubmit="return confirm('¿Eliminar el mensaje?')"><button>Eliminar</button></form></td></tr></tbody></table></div></main></body></html>
