<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Noticias | Shotoyama</title><link rel="icon" th:href="@{/images/favicon.svg}" type="image/svg+xml"><link rel="stylesheet" th:href="@{/css/site.css}"></head><body>
<div th:replace="~{fragments/header :: header(${pagina})}"></div><main><section class="page-hero"><div class="container"><span class="eyebrow">Actualidad del club</span><h1>Noticias</h1><p>Resultados, convocatorias, reconocimientos y vida diaria de Shotoyama.</p></div></section>
<section class="section container"><div class="news-list"><article th:each="n:${noticias}"><div class="news-image"><img th:if="${n.imagenUrl!=null and !n.imagenUrl.isBlank()}" th:src="${n.imagenUrl}" alt=""><span>SHOT<em>OYAMA</em></span></div><div><time th:text="${@formato.fecha(n.fechaPublicacion)}">Fecha</time><h2 th:text="${n.titulo}">Título</h2><p th:text="${n.resumen}">Resumen</p><a th:href="@{/noticias/{id}(id=${n.id})}">Leer noticia completa →</a></div></article></div></section></main><div th:replace="~{fragments/footer :: footer}"></div></body></html>
