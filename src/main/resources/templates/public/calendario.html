<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Calendario | Shotoyama</title><link rel="icon" th:href="@{/images/favicon.png}" type="image/svg+xml"><link rel="stylesheet" th:href="@{/css/site.css}"></head><body>
<div th:replace="~{fragments/header :: header(${pagina})}"></div><main><section class="page-hero"><div class="container"><span class="eyebrow">Agenda Shotoyama</span><h1>Calendario</h1><p>Entrenamientos especiales, campeonatos, tecnificaciones, exámenes y actividades.</p></div></section>
<section class="section container calendar-layout"><div class="calendar-card"><div class="calendar-toolbar"><button id="prev">←</button><h2 id="month-title">Calendario</h2><button id="next">→</button><button id="today">Hoy</button></div><div class="week"><span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span></div><div id="calendar-grid" class="calendar-grid"></div></div>
<aside class="upcoming"><span class="eyebrow">A continuación</span><h2>Próximas citas</h2><article th:each="e:${eventos}"><div><strong th:text="${@formato.diaMes(e.inicio)}">17 jul</strong><small th:text="${@formato.hora(e.inicio)}">18:00</small></div><span><small class="tag" th:text="${e.tipo}">CLUB</small><h3 th:text="${e.titulo}">Evento</h3><p th:text="${e.ubicacion}">Lugar</p></span></article></aside></section>
<section class="section container" th:if="${googleCalendar!=null and !googleCalendar.isBlank()}"><div class="section-title"><div><span class="eyebrow">Google Calendar</span><h2>Calendario público del club</h2></div></div><iframe class="google-calendar" th:src="${googleCalendar}" title="Google Calendar Shotoyama"></iframe></section>
<div class="modal" id="event-modal"><div class="backdrop" data-close></div><article><button data-close>×</button><small class="tag" id="modal-type"></small><h2 id="modal-title"></h2><strong id="modal-date"></strong><p id="modal-description"></p><p id="modal-location"></p><a class="btn primary" id="modal-google" target="_blank">Añadir a Google Calendar</a></article></div>
</main><div th:replace="~{fragments/footer :: footer}"></div><script th:src="@{/js/calendar.js}"></script></body></html>
