<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Horarios | Shotoyama</title><link rel="icon" th:href="@{/images/favicon.png}" type="image/svg+xml"><link rel="stylesheet" th:href="@{/css/site.css}"></head><body>
<div th:replace="~{fragments/header :: header(${pagina})}"></div><main><section class="page-hero"><div class="container"><span class="eyebrow">Encuentra tu grupo</span><h1>Horarios</h1><p>Consulta los grupos disponibles por localidad.</p></div></section>
<section class="section container"><section class="location" th:each="g:${grupos}"><header><b>⌖</b><span><small>SEDE</small><h2 th:text="${g.key}">Marchena</h2></span></header><div class="table-wrap"><table><thead><tr><th>Grupo</th><th>Días</th><th>Horario</th><th>Instalación</th><th>Entrenador/a</th></tr></thead><tbody><tr th:each="h:${g.value}"><td><strong th:text="${h.grupo}">Grupo</strong><small th:text="${h.observaciones}"></small></td><td th:text="${h.dias}">Días</td><td><b class="time" th:text="${h.franja}">17:00</b></td><td th:text="${h.instalacion}">Lugar</td><td th:text="${h.entrenador}">Entrenador</td></tr></tbody></table></div></section>
<div class="help-banner"><strong>¿No sabes qué grupo elegir?</strong><span>Cuéntanos tu edad y experiencia y te orientaremos.</span><a class="btn black" th:href="@{/contacto}">Consultar</a></div></section></main><div th:replace="~{fragments/footer :: footer}"></div></body></html>
