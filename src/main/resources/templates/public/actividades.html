<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Actividades | Shotoyama</title>
    <link rel="icon" th:href="@{/images/favicon.png}" type="image/svg+xml">
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>

<body>
    <div th:replace="~{fragments/header :: header(${pagina})}"></div>
    <main>
        <section class="page-hero">
            <div class="container"><span class="eyebrow">Para todas las edades</span>
                <h1>Actividades</h1>
                <p>Formación, competición, salud y participación social.</p>
            </div>
        </section>
        <section class="section container">
            <div class="activity-grid">
                <article th:each="a,st:${actividades}"><b class="number"
                        th:text="${#numbers.formatInteger(st.index+1,2)}">01</b><small class="tag"
                        th:text="${a.categoria}">FORMACIÓN</small>
                    <h2 th:text="${a.nombre}">Actividad</h2><strong th:text="${a.resumen}">Resumen</strong>
                    <p th:text="${a.descripcion}">Descripción</p>
                    <footer><span>Edad recomendada</span><b th:text="${a.edad}">Desde 4 años</b></footer>
                </article>
            </div>
        </section>
        <section class="cta">
            <div class="container">
                <div><span class="eyebrow">Haz karate con nosotros</span>
                    <h2>Hay un lugar para ti en el dojo.</h2>
                </div><a class="btn black" th:href="@{/contacto}">Solicitar información</a>
            </div>
        </section>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
