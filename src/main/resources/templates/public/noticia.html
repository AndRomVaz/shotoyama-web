<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title th:text="${noticia.titulo+' | Shotoyama'}">Noticia</title><link rel="icon" th:href="@{/images/favicon.svg}" type="image/svg+xml"><link rel="stylesheet" th:href="@{/css/site.css}"></head><body>
<div th:replace="~{fragments/header :: header(${pagina})}"></div><main><article class="article"><header><div class="container article-width"><a th:href="@{/noticias}">← Volver a noticias</a><small class="tag">ACTUALIDAD</small><h1 th:text="${noticia.titulo}">Título</h1><p th:text="${noticia.resumen}">Resumen</p><time th:text="${@formato.fecha(noticia.fechaPublicacion)}">Fecha</time></div></header><div class="container article-width"><div class="article-image"><img th:if="${noticia.imagenUrl!=null and !noticia.imagenUrl.isBlank()}" th:src="${noticia.imagenUrl}" alt=""><span>SHOT<em>OYAMA</em></span></div><div class="article-text" th:text="${noticia.contenido}">Contenido</div><a class="source" th:if="${noticia.fuenteUrl!=null and !noticia.fuenteUrl.isBlank()}" th:href="${noticia.fuenteUrl}" target="_blank">Consultar fuente original ↗</a></div></article></main><div th:replace="~{fragments/footer :: footer}"></div></body></html>
